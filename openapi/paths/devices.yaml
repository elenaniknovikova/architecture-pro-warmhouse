paths:
  /devices:
    get:
      tags:
        - Devices
      summary: Получить список устройств
      description: Возвращает список всех устройств пользователя с возможностью фильтрации
      operationId: listDevices
      parameters:
        - name: type
          in: query
          description: Фильтр по типу устройства
          schema:
            type: string
            enum: [thermostat, light, sensor, camera, gate, lock, outlet]
        - name: room
          in: query
          description: Фильтр по комнате
          schema:
            type: string
        - name: status
          in: query
          description: Фильтр по статусу
          schema:
            type: string
            enum: [online, offline, error]
        - name: limit
          in: query
          description: Количество записей на странице
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Смещение для пагинации
          schema:
            type: integer
            default: 0
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '../openapi.yaml#/components/schemas/Device'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    post:
      tags:
        - Devices
      summary: Создать новое устройство
      description: Регистрирует новое устройство в системе
      operationId: createDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  description: Название устройства
                  example: "Living Room Light"
                type:
                  type: string
                  enum: [thermostat, light, sensor, camera, gate, lock, outlet]
                  description: Тип устройства
                model_id:
                  type: string
                  description: ID модели устройства
                room:
                  type: string
                  description: Комната, где установлено устройство
                metadata:
                  type: object
                  description: Дополнительные метаданные
                  additionalProperties: true
      responses:
        '201':
          description: Устройство создано
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Device'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /devices/{deviceId}:
    get:
      tags:
        - Devices
      summary: Получить устройство по ID
      description: Возвращает информацию о конкретном устройстве
      operationId: getDeviceById
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID устройства
          schema:
            type: string
            example: "dev-123"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Устройство найдено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Device'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    put:
      tags:
        - Devices
      summary: Обновить устройство
      description: Обновляет информацию об устройстве
      operationId: updateDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                room:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Устройство обновлено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Device'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    delete:
      tags:
        - Devices
      summary: Удалить устройство
      description: Удаляет устройство из системы
      operationId: deleteDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Устройство удалено
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /devices/{deviceId}/state:
    patch:
      tags:
        - Devices
      summary: Обновить состояние устройства
      description: Отправляет команду устройству (включить/выключить, изменить настройки)
      operationId: updateDeviceState
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          description: ETag для предотвращения конфликтов
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  enum: [turn_on, turn_off, set_brightness, set_temperature, lock, unlock]
                parameters:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Команда выполнена
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceId:
                    type: string
                  status:
                    type: string
                    enum: [online, offline, error]
                  state:
                    type: object
                  lastUpdated:
                    type: string
                    format: date-time
        '400':
          description: Неверная команда
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /models:
    get:
      tags:
        - Devices
      summary: Получить список моделей устройств
      description: Возвращает список доступных моделей устройств
      operationId: listModels
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: manufacturer
          in: query
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список моделей
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '../openapi.yaml#/components/schemas/DeviceModel'
                  total:
                    type: integer

    post:
      tags:
        - Devices
      summary: Зарегистрировать новую модель
      description: Добавляет новую модель устройства (для партнёров)
      operationId: createModel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - manufacturer
                - type
              properties:
                name:
                  type: string
                manufacturer:
                  type: string
                type:
                  type: string
                  enum: [thermostat, light, sensor, camera, gate, lock, outlet]
                supported_protocols:
                  type: array
                  items:
                    type: string
                capabilities:
                  type: object
                  additionalProperties: true
                default_config:
                  type: object
                  additionalProperties: true
                firmware_version:
                  type: string
      responses:
        '201':
          description: Модель создана
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/DeviceModel'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'