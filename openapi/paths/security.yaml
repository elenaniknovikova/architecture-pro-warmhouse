paths:
  /register:
    post:
      tags:
        - Authentication
      summary: Регистрация нового пользователя
      description: Создаёт новую учётную запись пользователя
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя
                  example: "user@example.com"
                password:
                  type: string
                  description: Пароль (минимум 8 символов)
                  minLength: 8
                  example: "SecurePass123"
                full_name:
                  type: string
                  description: Полное имя
                  example: "John Doe"
                tenant_id:
                  type: string
                  description: ID тенанта (для мультитенантности)
                  example: "tenant-789"
                phone:
                  type: string
                  description: Номер телефона
                  example: "+1234567890"
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 3600
                  user:
                    $ref: '../openapi.yaml#/components/schemas/User'
        '400':
          description: Неверный формат запроса
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '409':
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /login:
    post:
      tags:
        - Authentication
      summary: Вход в систему
      description: Аутентификация пользователя и получение JWT токена
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: Email пользователя
                password:
                  type: string
                  description: Пароль
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 3600
                  user:
                    $ref: '../openapi.yaml#/components/schemas/User'
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /logout:
    post:
      tags:
        - Authentication
      summary: Выход из системы
      description: Инвалидация текущего токена
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Успешный выход
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /refresh:
    post:
      tags:
        - Authentication
      summary: Обновление токена
      description: Получение новой пары токенов по refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: Refresh токен
      responses:
        '200':
          description: Токены обновлены
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 3600
        '401':
          description: Недействительный refresh token
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /verify:
    post:
      tags:
        - Authentication
      summary: Подтверждение email
      description: Подтверждает email пользователя по коду из письма
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  description: Код подтверждения
      responses:
        '200':
          description: Email подтверждён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email verified successfully"
        '400':
          description: Неверный код
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /validate:
    post:
      tags:
        - Authentication
      summary: Проверка токена
      description: Проверяет валидность JWT токена
      operationId: validateToken
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                required_permission:
                  type: string
                  description: Опционально — требуемое разрешение
      responses:
        '200':
          description: Токен валиден
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  user_id:
                    type: string
                  tenant_id:
                    type: string
                  roles:
                    type: array
                    items:
                      type: string
                  permissions:
                    type: array
                    items:
                      type: string
        '401':
          description: Токен недействителен
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /password-reset/request:
    post:
      tags:
        - Authentication
      summary: Запрос сброса пароля
      description: Отправляет на email ссылку для сброса пароля
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: Письмо отправлено

  /password-reset/confirm:
    post:
      tags:
        - Authentication
      summary: Подтверждение сброса пароля
      description: Устанавливает новый пароль по токену из письма
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Пароль изменён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: Неверный токен или слабый пароль
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /users/me:
    get:
      tags:
        - Authentication
      summary: Получить информацию о текущем пользователе
      description: Возвращает профиль текущего авторизованного пользователя
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/User'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    put:
      tags:
        - Authentication
      summary: Обновить профиль пользователя
      description: Обновляет информацию о текущем пользователе
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                phone:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/User'

  /users/{userId}:
    get:
      tags:
        - Authentication
      summary: Получить информацию о пользователе по ID
      description: Возвращает информацию о пользователе (для администраторов)
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/User'
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    delete:
      tags:
        - Authentication
      summary: Удалить пользователя
      description: Удаляет учётную запись пользователя (для администраторов)
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Пользователь удалён
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /users:
    get:
      tags:
        - Authentication
      summary: Получить список пользователей
      description: Возвращает список всех пользователей (для администраторов)
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '../openapi.yaml#/components/schemas/User'
                  total:
                    type: integer
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /apikeys:
    get:
      tags:
        - Authentication
      summary: Получить список API-ключей
      description: Возвращает список API-ключей текущего пользователя
      operationId: listApiKeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список API-ключей
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '../openapi.yaml#/components/schemas/APIKey'

    post:
      tags:
        - Authentication
      summary: Создать новый API-ключ
      description: Создаёт новый API-ключ для интеграции с партнёрскими системами
      operationId: createApiKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
                expires_at:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Ключ создан
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/APIKey'

  /apikeys/{keyId}:
    delete:
      tags:
        - Authentication
      summary: Отозвать API-ключ
      description: Удаляет (отзывает) API-ключ
      operationId: revokeApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Ключ отозван
        '404':
          description: Ключ не найден
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /apikeys/{keyId}/refresh:
    post:
      tags:
        - Authentication
      summary: Продлить API-ключ
      description: Обновляет дату истечения API-ключа
      operationId: refreshApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Ключ обновлён
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/APIKey'
        '404':
          description: Ключ не найден
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /roles:
    get:
      tags:
        - Authentication
      summary: Получить список ролей
      description: Возвращает список всех ролей в системе (для администраторов)
      operationId: listRoles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список ролей
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      $ref: '../openapi.yaml#/components/schemas/Role'
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

    post:
      tags:
        - Authentication
      summary: Создать новую роль
      description: Создаёт новую роль с набором разрешений (для администраторов)
      operationId: createRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                description:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Роль создана
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Role'
        '403':
          description: Недостаточно прав
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /roles/{roleId}/assign:
    post:
      tags:
        - Authentication
      summary: Назначить роль пользователю
      description: Назначает роль указанному пользователю (для администраторов)
      operationId: assignRole
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '204':
          description: Роль назначена
        '404':
          description: Пользователь или роль не найдены
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'

  /roles/{roleId}/revoke:
    post:
      tags:
        - Authentication
      summary: Отозвать роль у пользователя
      description: Удаляет роль у указанного пользователя (для администраторов)
      operationId: revokeRole
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
      responses:
        '204':
          description: Роль отозвана
        '404':
          description: Пользователь или роль не найдены
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/Error'