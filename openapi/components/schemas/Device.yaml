openapi: 3.0.0
info:
  title: Device Service API
  description: API для управления устройствами умного дома
  version: 1.0.0
  contact:
    name: Smart Home Team
    email: dev@smarthome.com

servers:
  - url: https://api.smarthome.com/v1/devices
    description: Production server
  - url: http://localhost:8082/api/v1
    description: Local development server

tags:
  - name: Devices
    description: Управление устройствами
  - name: Models
    description: Управление моделями устройств (для партнёров)

paths:
  /devices:
    get:
      tags:
        - Devices
      summary: Получить список устройств
      description: Возвращает список всех устройств пользователя с возможностью фильтрации
      operationId: listDevices
      parameters:
        - name: type
          in: query
          description: Фильтр по типу устройства
          schema:
            type: string
            enum: [thermostat, light, sensor, camera, gate, lock, outlet]
        - name: room
          in: query
          description: Фильтр по комнате
          schema:
            type: string
        - name: status
          in: query
          description: Фильтр по статусу
          schema:
            type: string
            enum: [online, offline, error]
        - name: limit
          in: query
          description: Количество записей на странице
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Смещение для пагинации
          schema:
            type: integer
            default: 0
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                  total:
                    type: integer
                    example: 42
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags:
        - Devices
      summary: Создать новое устройство
      description: Регистрирует новое устройство в системе
      operationId: createDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  description: Название устройства
                  example: "Living Room Light"
                type:
                  type: string
                  enum: [thermostat, light, sensor, camera, gate, lock, outlet]
                  description: Тип устройства
                model_id:
                  type: string
                  description: ID модели устройства
                  example: "model-123"
                room:
                  type: string
                  description: Комната, где установлено устройство
                  example: "living_room"
                metadata:
                  type: object
                  description: Дополнительные метаданные
                  additionalProperties: true
                  example:
                    brand: "Philips"
                    firmware: "1.2.3"
      responses:
        '201':
          description: Устройство создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Конфликт (устройство уже существует)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /devices/{deviceId}:
    get:
      tags:
        - Devices
      summary: Получить устройство по ID
      description: Возвращает информацию о конкретном устройстве
      operationId: getDeviceById
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID устройства
          schema:
            type: string
            example: "dev-123"
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Устройство найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Devices
      summary: Обновить устройство
      description: Обновляет информацию об устройстве
      operationId: updateDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID устройства
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Новое название устройства
                room:
                  type: string
                  description: Новая комната
                metadata:
                  type: object
                  description: Обновлённые метаданные
      responses:
        '200':
          description: Устройство обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Devices
      summary: Удалить устройство
      description: Удаляет устройство из системы
      operationId: deleteDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID устройства
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Устройство удалено
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /devices/{deviceId}/state:
    patch:
      tags:
        - Devices
      summary: Обновить состояние устройства
      description: Отправляет команду устройству (включить/выключить, изменить настройки)
      operationId: updateDeviceState
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID устройства
          schema:
            type: string
        - name: If-Match
          in: header
          description: ETag для предотвращения конфликтов
          schema:
            type: string
            example: '"abc123"'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  description: Команда для устройства
                  enum: [turn_on, turn_off, set_brightness, set_temperature, lock, unlock]
                parameters:
                  type: object
                  description: Параметры команды
                  additionalProperties: true
                  example:
                    brightness: 80
                    transition_ms: 500
      responses:
        '200':
          description: Команда выполнена
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceId:
                    type: string
                  status:
                    type: string
                    enum: [online, offline, error]
                  state:
                    type: object
                    additionalProperties: true
                  lastUpdated:
                    type: string
                    format: date-time
        '400':
          description: Неверная команда
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Нет прав
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Устройство не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Конфликт версий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '412':
          description: Условие If-Match не выполнено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /models:
    get:
      tags:
        - Models
      summary: Получить список моделей устройств
      description: Возвращает список доступных моделей устройств
      operationId: listModels
      parameters:
        - name: type
          in: query
          description: Фильтр по типу устройства
          schema:
            type: string
        - name: manufacturer
          in: query
          description: Фильтр по производителю
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список моделей
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeviceModel'
                  total:
                    type: integer

    post:
      tags:
        - Models
      summary: Зарегистрировать новую модель
      description: Добавляет новую модель устройства (для партнёров)
      operationId: createModel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelRequest'
      responses:
        '201':
          description: Модель создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceModel'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: string
          description: Уникальный идентификатор устройства
          example: "dev-123"
        name:
          type: string
          description: Название устройства
          example: "Living Room Light"
        type:
          type: string
          description: Тип устройства
          enum: [thermostat, light, sensor, camera, gate, lock, outlet]
        model_id:
          type: string
          description: ID модели устройства
          example: "model-123"
        room:
          type: string
          description: Комната установки
          example: "living_room"
        status:
          type: string
          description: Статус устройства
          enum: [online, offline, error]
          example: "online"
        metadata:
          type: object
          description: Дополнительные метаданные
          additionalProperties: true
        last_seen:
          type: string
          format: date-time
          description: Время последней активности
        created_at:
          type: string
          format: date-time
          description: Время создания
        updated_at:
          type: string
          format: date-time
          description: Время последнего обновления
        online:
          type: boolean
          description: Доступно ли устройство сейчас
          example: true

    DeviceModel:
      type: object
      properties:
        id:
          type: string
          description: Уникальный идентификатор модели
          example: "model-123"
        name:
          type: string
          description: Название модели
          example: "Philips Hue White"
        manufacturer:
          type: string
          description: Производитель
          example: "Philips"
        type:
          type: string
          description: Тип устройства
          enum: [thermostat, light, sensor, camera, gate, lock, outlet]
        supported_protocols:
          type: array
          description: Поддерживаемые протоколы
          items:
            type: string
            enum: [mqtt, zigbee, zwave, wifi, bluetooth]
          example: ["zigbee", "mqtt"]
        capabilities:
          type: object
          description: Возможности устройства
          additionalProperties: true
          example:
            brightness: true
            color_temp: true
            rgb: false
        default_config:
          type: object
          description: Конфигурация по умолчанию
          additionalProperties: true
        firmware_version:
          type: string
          description: Версия прошивки
          example: "1.2.3"
        released_at:
          type: string
          format: date-time
          description: Дата выпуска
        is_active:
          type: boolean
          description: Активна ли модель
          default: true

    CreateModelRequest:
      type: object
      required:
        - name
        - manufacturer
        - type
      properties:
        name:
          type: string
          description: Название модели
          example: "Philips Hue White"
        manufacturer:
          type: string
          description: Производитель
          example: "Philips"
        type:
          type: string
          description: Тип устройства
          enum: [thermostat, light, sensor, camera, gate, lock, outlet]
        supported_protocols:
          type: array
          description: Поддерживаемые протоколы
          items:
            type: string
          example: ["zigbee", "mqtt"]
        capabilities:
          type: object
          description: Возможности устройства
          additionalProperties: true
        default_config:
          type: object
          description: Конфигурация по умолчанию
          additionalProperties: true
        firmware_version:
          type: string
          description: Версия прошивки
          example: "1.2.3"

    Error:
      type: object
      properties:
        code:
          type: integer
          description: HTTP код ошибки
          example: 400
        message:
          type: string
          description: Сообщение об ошибке
          example: "Invalid request format"
        details:
          type: string
          description: Дополнительные детали
          example: "Missing required field: name"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен, полученный при аутентификации